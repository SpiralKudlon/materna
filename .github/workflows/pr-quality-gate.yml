name: PR Security & Quality Gate

on:
    pull_request:
        branches: [main, develop]

permissions:
    contents: read
    pull-requests: write
    security-events: write # for Snyk/Trivy SARIF upload

jobs:
    # ─────────────────────────────────────────────────────────────────────────
    # 1. Dependency Audit
    # ─────────────────────────────────────────────────────────────────────────
    npm-audit:
        name: npm Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run npm audit (fail on HIGH or CRITICAL)
              # --audit-level=high causes a non-zero exit on HIGH/CRITICAL vulns
              run: npm audit --audit-level=high

    # ─────────────────────────────────────────────────────────────────────────
    # 2. Unit Tests + Coverage Gate
    # ─────────────────────────────────────────────────────────────────────────
    test-coverage:
        name: Unit Tests & Coverage Gate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install root dependencies
              run: npm ci

            - name: Run tests with coverage
              run: npx turbo run test:coverage --continue
              env:
                  FORCE_COLOR: 1

            - name: Enforce 80% coverage threshold
              # Vitest's built-in threshold via config is the right place; this is an
              # extra belt-and-suspenders check that reads the JSON summary directly.
              run: |
                  COVERAGE_FILE=$(find . -path "*/coverage/coverage-summary.json" | head -1)
                  if [ -z "$COVERAGE_FILE" ]; then
                    echo "::error::coverage-summary.json not found – did vitest run?"
                    exit 1
                  fi
                  LINES=$(node -e "const c=require('$COVERAGE_FILE').total.lines.pct; console.log(c)")
                  echo "Line coverage: $LINES%"
                  node -e "
                    const pct = require('$COVERAGE_FILE').total.lines.pct;
                    if (pct < 80) { console.error('Coverage '+ pct +'% is below the 80% threshold'); process.exit(1); }
                    console.log('Coverage gate passed: '+ pct +'%');
                  "

            - name: Upload coverage report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-report
                  path: "**/coverage/"
                  retention-days: 7

    # ─────────────────────────────────────────────────────────────────────────
    # 3. Snyk – SCA / Dependency Vulnerability Scan
    # ─────────────────────────────────────────────────────────────────────────
    snyk-scan:
        name: Snyk Dependency Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run Snyk (block on HIGH+ vulnerabilities)
              uses: snyk/actions/node@master
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              with:
                  # Fail the job if any HIGH or CRITICAL vulnerabilities are found
                  args: --severity-threshold=high --all-projects

            - name: Upload Snyk SARIF to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: snyk.sarif
              continue-on-error: true # SARIF upload is optional

    # ─────────────────────────────────────────────────────────────────────────
    # 4. Trivy – Container Image Vulnerability Scan
    # ─────────────────────────────────────────────────────────────────────────
    trivy-scan:
        name: Trivy Container Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Build identity service Docker image
              run: |
                  docker build \
                    -t maternal-system/identity:pr-${{ github.event.pull_request.number }} \
                    apps/identity/

            - name: Run Trivy (block on HIGH or CRITICAL)
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: maternal-system/identity:pr-${{ github.event.pull_request.number }}
                  format: sarif
                  output: trivy-results.sarif
                  exit-code: "1" # non-zero exit = fail the job
                  severity: HIGH,CRITICAL
                  ignore-unfixed: true # ignore vulns with no patch available

            - name: Upload Trivy SARIF to Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                  sarif_file: trivy-results.sarif

    # ─────────────────────────────────────────────────────────────────────────
    # 5. Gate Summary  (Required status check)
    # ─────────────────────────────────────────────────────────────────────────
    # Configure this job as the sole required check in GitHub branch protection.
    # It only succeeds when ALL of the above jobs pass.
    quality-gate:
        name: Quality Gate
        runs-on: ubuntu-latest
        needs:
            - npm-audit
            - test-coverage
            - snyk-scan
            - trivy-scan
        if: always()
        steps:
            - name: Evaluate gate result
              run: |
                  echo "npm-audit:    ${{ needs.npm-audit.result }}"
                  echo "test-coverage: ${{ needs.test-coverage.result }}"
                  echo "snyk-scan:    ${{ needs.snyk-scan.result }}"
                  echo "trivy-scan:   ${{ needs.trivy-scan.result }}"

                  if [[ "${{ needs.npm-audit.result }}"    != "success" || \
                        "${{ needs.test-coverage.result }}" != "success" || \
                        "${{ needs.snyk-scan.result }}"    != "success" || \
                        "${{ needs.trivy-scan.result }}"   != "success" ]]; then
                    echo "::error::One or more quality checks failed – merge is blocked."
                    exit 1
                  fi

                  echo "All quality checks passed – merge is approved."
