openapi: "3.1.0"
info:
  title: Maternal System — Identity Service API
  version: 1.0.0
  description: |
    Authentication and authorization endpoints for the Maternal System.
    Handles user registration, login, password reset via SMS OTP, and
    token-based authentication using Keycloak.
  contact:
    name: Maternal System Team
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.maternal-system.example.com
    description: Production

tags:
  - name: Auth
    description: Registration, login, and password management
  - name: Health
    description: Service health probe

paths:
  # ────────────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Kubernetes liveness/readiness probe.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ────────────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: |
        Creates a user in both Keycloak and the local PostgreSQL `users` table
        within a distributed Saga transaction. On PostgreSQL failure, a
        compensating Keycloak delete is issued automatically.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          description: Validation error (missing/invalid fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error (Saga rollback may have occurred)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      description: |
        Exchanges user credentials for Keycloak-issued tokens.
        Access token is valid for 15 minutes, refresh token for 7 days.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ────────────────────────────────────────────────────────────────────────
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      description: |
        Generates a 6-digit OTP, stores it in Redis with a 5-minute TTL,
        and sends it via Africa's Talking SMS. Always returns 200 to prevent
        phone number enumeration.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: OTP sent (or silently discarded for unregistered numbers)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sent:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: "If the phone number is registered, an OTP has been sent."
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  # ────────────────────────────────────────────────────────────────────────
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with OTP
      description: |
        Validates the OTP against Redis (max 3 attempts per OTP).
        On success, resets the user's password in Keycloak.
        Returns 429 after the 3rd failed attempt.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Password has been reset successfully."
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Maximum OTP attempts exceeded (3 failures)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ──────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak-issued RS256 JWT

  schemas:
    # ── Requests ──────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, name, role]
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 8
          description: "Must contain ≥1 uppercase letter and ≥1 digit"
          example: Password1
        name:
          type: string
          minLength: 2
          example: Jane Doe
        role:
          type: string
          enum: [PATIENT, CHV, PROVIDER, ADMIN]
          example: PATIENT

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: jane@example.com
        password:
          type: string
          minLength: 1
          example: Password1

    ForgotPasswordRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          minLength: 10
          pattern: '^\+?[0-9]+$'
          example: "+254712345678"

    ResetPasswordRequest:
      type: object
      required: [phone, otp, new_password]
      properties:
        phone:
          type: string
          minLength: 10
          pattern: '^\+?[0-9]+$'
          example: "+254712345678"
        otp:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          example: "482917"
        new_password:
          type: string
          minLength: 8
          description: "Must contain ≥1 uppercase letter and ≥1 digit"
          example: NewPassword1

    # ── Responses ─────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [PATIENT, CHV, PROVIDER, ADMIN]
        keycloak_id:
          type: string
          format: uuid

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "JWT valid for 15 minutes"
        refresh_token:
          type: string
          description: "Opaque token valid for 7 days"
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        refresh_expires_in:
          type: integer
          example: 604800

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Invalid credentials"

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Validation failed"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "email"
              message:
                type: string
                example: "A valid email address is required"

security:
  - bearerAuth: []
